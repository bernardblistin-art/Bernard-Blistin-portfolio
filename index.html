<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bernard Blistin</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      min-height: 100vh;
      overflow: hidden;
    }

    .page {
      width: 100vw;
      height: 100vh;
      background-image: url("portrait avec texte.jpg");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #000;
    }

    @media (max-width: 768px) {
      .page {
        background-size: contain;
      }
    }
  </style>
</head>

<body>
  <main class="page"></main>
</body>
</html>
